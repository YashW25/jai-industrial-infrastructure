<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Primary SEO -->
    <title>
      Jai Industrial Infrastructure | Industrial Engineering & Infrastructure Solutions India
    </title>

    <meta
      name="description"
      content="Jai Industrial Infrastructure is a leading industrial engineering and infrastructure company based in Kinhi MIDC, Bhusawal (Maharashtra), delivering fabrication, construction, and turnkey infrastructure solutions across India and international markets."
    />

    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="author" content="Jai Industrial Infrastructure" />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://www.jaiindustrialinfrastructure.in/"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.jaiindustrialinfrastructure.in/" />
    <meta
      property="og:title"
      content="Jai Industrial Infrastructure | Engineering & Infrastructure Solutions"
    />
    <meta
      property="og:description"
      content="Industrial construction, fabrication, and infrastructure development company serving India and export markets from Kinhi MIDC, Bhusawal, Maharashtra."
    />
    <meta
      property="og:image"
      content="https://www.jaiindustrialinfrastructure.in/og-image.png"
    />
    <meta property="og:site_name" content="Jai Industrial Infrastructure" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Jai Industrial Infrastructure | Industrial Engineering India"
    />
    <meta
      name="twitter:description"
      content="Providing industrial infrastructure, fabrication, and engineering solutions across India and global export markets."
    />
    <meta
      name="twitter:image"
      content="https://www.jaiindustrialinfrastructure.in/og-image.png"
    />

    <!-- Geo Targeting -->
    <meta name="geo.region" content="IN-MH" />
    <meta name="geo.placename" content="Kinhi MIDC, Bhusawal, Maharashtra" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#004643" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (SEO Boost) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Jai Industrial Infrastructure",
        "url": "https://www.jaiindustrialinfrastructure.in",
        "logo": "https://www.jaiindustrialinfrastructure.in/favicon.png",
        "description": "Industrial engineering and infrastructure company providing fabrication, construction and turnkey project solutions across India and export markets.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Kinhi MIDC",
          "addressLocality": "Bhusawal",
          "postalCode": "425201",
          "addressRegion": "Maharashtra",
          "addressCountry": "India"
        },
        "areaServed": [
          {
            "@type": "Country",
            "name": "India"
          },
          {
            "@type": "Place",
            "name": "International Export Markets"
          }
        ],
        "foundingLocation": {
          "@type": "Place",
          "name": "Kinhi MIDC, Bhusawal, Maharashtra, India"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
